[workspace]
channels = ["conda-forge"]
name = "pytorch-pypi"
platforms = ["linux-64"]

[dependencies]
# We need a python version that is compatible with pytorch
python = ">=3.11,<3.13"
cmake = ">=4.3.1,<5"
ninja = ">=1.13.2,<2"
compilers = ">=1.11.0,<2"
boost-cpp = ">=1.85.0,<2"

[pypi-dependencies]
torch = { version = ">=2.10.0", index = "https://download.pytorch.org/whl/cu128" }
torchvision = { version = "*", index = "https://download.pytorch.org/whl/cu128" }
torchcodec = ">=0.11.1, <0.12"
transformers = ">=5.5.4, <6"
datasets = ">=4.8.4, <5"
ipykernel = ">=7.2.0, <8"
evaluate = ">=0.4.6, <0.5"
iprogress = ">=0.4, <0.5"
accelerate = ">=1.13.0, <2"
jiwer = ">=4.0.0, <5"
tensorboardx = ">=2.6.5, <3"
nvidia-cublas-cu12 = ">=12.8.4.1, <13"
nvidia-cuda-cupti-cu12 = ">=12.8.90, <13"
nvidia-cuda-nvrtc-cu12 = ">=12.8.93, <13"
nvidia-cufft-cu12 = ">=11.3.3.83, <12"
nvidia-curand-cu12 = ">=10.3.9.90, <11"
nvidia-cusolver-cu12 = ">=11.7.3.90, <12"
nvidia-cusparse-cu12 = ">=12.5.8.93, <13"
nvidia-nccl-cu12 = ">=2.28.9, <3"
nvidia-nvjitlink-cu12 = ">=12.8.93, <13"
nvidia-nvtx-cu12 = ">=12.8.90, <13"
nvidia-cudnn-cu12 = ">=9.19.0.56, <10"
pyctcdecode = ">=0.5.0, <0.6"
sentencepiece = ">=0.2.1, <0.3"
kenlm = ">=0.3.0, <0.4"
textblob = ">=0.20.0, <0.21"
pyspellchecker = ">=0.9.0, <0.10"
audiomentations = ">=0.43.1, <0.44"

[activation.env]
HF_HOME = "/media/justin/SSD Ubuntu Stora/datasets/huggingface"
HF_HUB_CACHE = "$HF_HOME/hub"
HF_XET_CACHE = "$HF_HOME/xet"
HF_ASSETS_CACHE = "$HF_HOME/assets"
